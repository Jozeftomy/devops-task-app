version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment: 
      - MONGO_URL=mongodb://mongo:27017/devopsdb
      - REACT_APP_API_URL=http://backend:5000  

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"   
    volumes:
      - mongo-data:/data/db


volumes: 
    mongo-data:      